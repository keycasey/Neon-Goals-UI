name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy
        run: |
          export PATH=/home/ec2-user/.bun/bin:$PATH
          cd /var/www/Neon-Goals-UI
          git pull origin main
          bun install --frozen-lockfile
          bun run build
